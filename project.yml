name: WalletDemo
options:
  bundleIdPrefix: com.pablo
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"          # set "6.0" to opt into the Swift 6 language mode (strict concurrency)
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  WalletDemo:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Pass/WorldCupPass.pass/pass.json   # single source of truth, bundled for the in-app card
        buildPhase: resources
      - path: Resources                          # built WorldCupPass.pkpass (loaded by the Add-to-Wallet flow)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pablo.WalletDemo
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
